<!-- File responsibility: Icon for the Diff Workbench in FreeCAD, displayed in the workbench selector panel. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="3" fill="#212529"/>
  <!-- Left panel (red) -->
  <rect x="2" y="2" width="13" height="28" rx="1" fill="#FF585D" opacity="0.85"/>
  <!-- Right panel (blue) -->
  <rect x="17" y="2" width="13" height="28" rx="1" fill="#418FDE" opacity="0.85"/>
  <!-- Left lines (simulating code) -->
  <rect x="4" y="6" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="4" y="11" width="6" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="4" y="16" width="9" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="4" y="21" width="5" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <!-- Right lines -->
  <rect x="19" y="6" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="11" width="9" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="16" width="6" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="21" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <!-- Center divider -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#FFFFFF" stroke-width="1.5"/>
</svg>
