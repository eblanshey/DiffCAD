<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1"/>
    </radialGradient>

    <mask id="gearMask">
      <!-- Gear body -->
      <circle cx="50" cy="50" r="36" fill="white"/>

      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(0,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(45,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(90,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(135,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(180,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(225,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(270,50,50)"/>
      <polygon points="41,22 59,22 54.5,2 45.5,2" fill="white" transform="rotate(315,50,50)"/>

      <!-- Punch hole for clock face — enlarged to match new clock size -->
      <circle cx="50" cy="50" r="31" fill="black"/>
    </mask>
  </defs>

  <!-- Gear body -->
  <rect width="100" height="100" fill="url(#gearGrad)" mask="url(#gearMask)"/>

  <!-- Clock face — scaled up from r=25 to r=30 (1.2×) -->
  <circle cx="50" cy="50" r="30" fill="url(#faceGrad)"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#1565C0" stroke-width="2.5"/>

  <!-- Hour markers — positions scaled 1.2× from center -->
  <line x1="50" y1="27.8" x2="50" y2="34.2"  stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="65.8" x2="50" y2="72.2"  stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="27.8" y1="50" x2="34.2" y2="50"  stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="65.8" y1="50" x2="72.2" y2="50"  stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>

  <!-- Hour hand — tip scaled 1.2× from center -->
  <line x1="50" y1="50" x2="39.2" y2="36.8" stroke="#0D47A1" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Minute hand — tip scaled 1.2× from center -->
  <line x1="50" y1="50" x2="50" y2="29.6"   stroke="#1565C0" stroke-width="3"   stroke-linecap="round"/>

  <!-- Center cap — scaled 1.2× -->
  <circle cx="50" cy="50" r="4.8"  fill="#0D47A1"/>
  <circle cx="50" cy="50" r="2.16" fill="#FFFFFF"/>
</svg>
